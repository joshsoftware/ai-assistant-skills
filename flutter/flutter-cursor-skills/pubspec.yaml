name: bfsi_app
description: Flutter BFSI boilerplate with Clean Architecture, Riverpod, and Dio.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Biometric Auth
  local_auth: ^2.1.8

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
